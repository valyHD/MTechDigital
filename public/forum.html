<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum • MTECH Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --neon-blue: #00e5ff;
      --neon-purple: #b85cff;
      --neon-pink: #ff0080;
      --neon-green: #00ff88;
      --deep-1: #0a0e1a;
      --deep-2: #0f1624;
      --text: #e5f6ff;
      --muted: #8b9cb8;
      --accent: #a3cef1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { 
      scroll-behavior: smooth;
      overflow-y: scroll;
      height: 100%;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--deep-1) 0%, var(--deep-2) 100%);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      cursor: none;
      position: relative;
    }

    /* ========== FLOATING GRADIENT ORBS ========== */
    .gradient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
      animation: float 25s infinite ease-in-out;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
      top: -250px;
      left: -250px;
    }

    .orb-2 {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
      top: 20%;
      right: -350px;
      animation-delay: -8s;
    }

    .orb-3 {
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, var(--neon-pink) 0%, transparent 70%);
      bottom: 5%;
      left: 5%;
      animation-delay: -16s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(120px, -120px) scale(1.15); }
      66% { transform: translate(-120px, 120px) scale(0.85); }
    }

    /* ========== SCAN LINES ========== */
    .scan-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 229, 255, 0.02) 0px,
        transparent 1px,
        transparent 2px,
        rgba(0, 229, 255, 0.02) 3px
      );
      animation: scan 10s linear infinite;
    }

    @keyframes scan {
      from { transform: translateY(0); }
      to { transform: translateY(10px); }
    }

    /* ========== Custom Cursor ========== */
    .custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid var(--neon-blue);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transition: width 0.2s ease, height 0.2s ease, border-color 0.2s ease;
      mix-blend-mode: difference;
      will-change: transform;
    }

    .custom-cursor::before {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid var(--neon-blue);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .custom-cursor.hover {
      width: 45px;
      height: 45px;
      border-color: var(--neon-purple);
      background: rgba(184,92,255,0.12);
    }

    .custom-cursor.hover::before {
      opacity: 0.4;
      animation: pulse-ring 1.2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.9); opacity: 0.4; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ========== Three.js Canvas ========== */
    #scene-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== Enhanced Grid ========== */
    #tech-grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(0,229,255,0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.2) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 25s linear infinite;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* ========== Header ========== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 20px 0;
      backdrop-filter: blur(16px) saturate(180%);
      background: rgba(10, 14, 26, 0.3);
      border-bottom: 1px solid rgba(0, 229, 255, 0.06);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .header-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    /* ========== Main Content ========== */
    .container {
      position: relative;
      z-index: 10;
      width: min(1100px, 100% - 64px);
      margin: 120px auto 60px;
    }

    /* ========== Topic Header ========== */
    .topic-head {
      margin: 0 0 32px;
    }

    .topic-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      letter-spacing: 1px;
      margin: 0 0 12px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
      background-size: 200% 200%;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .topic-meta {
      color: var(--muted);
      font-size: 15px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .topic-meta span::after {
      content: '•';
      margin-left: 12px;
      opacity: 0.5;
    }

    .topic-meta span:last-child::after {
      display: none;
    }

    /* ========== Cards ========== */
    .card {
      background: linear-gradient(135deg, rgba(15, 22, 36, 0.8), rgba(10, 14, 26, 0.6));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.05), transparent);
      transition: left 0.5s;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      border-color: rgba(0, 229, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 
        0 12px 40px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(0, 229, 255, 0.1);
    }

    /* ========== Post Layout ========== */
    .post {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .post {
        grid-template-columns: 1fr;
      }
    }

    /* ========== Profile Card ========== */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 20px;
      background: rgba(0, 229, 255, 0.03);
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 16px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 28px;
      color: var(--deep-1);
      font-family: 'Orbitron', sans-serif;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
      transition: all 0.3s;
      text-decoration: none;
    }

    .avatar:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.6);
    }

    .profile a {
      color: var(--neon-blue);
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s;
    }

    .profile a:hover {
      color: var(--neon-purple);
    }

    /* ========== Post Content ========== */
    .post-content {
      line-height: 1.8;
      font-size: 15px;
      color: var(--text);
    }

    /* ========== Composer ========== */
    .composer {
      margin-top: 40px;
    }

    .composer h3 {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-blue);
      margin: 0 0 20px;
      font-size: 22px;
    }

    /* ========== Form Elements ========== */
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }

    textarea, input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(0, 229, 255, 0.05);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      transition: all 0.3s;
    }

    textarea:focus, input:focus {
      outline: none;
      border-color: var(--neon-blue);
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    /* ========== Buttons ========== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 14px;
      border: 2px solid transparent;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      color: var(--deep-1);
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.3);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0, 229, 255, 0.4);
    }

    /* ========== Reply Section ========== */
    .reply {
      margin-top: 16px;
    }

    .reply .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .reply .meta {
      font-size: 13px;
      color: var(--muted);
    }

    /* ========== Rows ========== */
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    /* ========== Hidden ========== */
    .hidden {
      display: none !important;
    }

    /* ========== Mobile Optimizations ========== */
    @media (max-width: 768px) {
      body {
        cursor: auto;
      }

      .custom-cursor {
        display: none;
      }

      .container {
        width: calc(100% - 40px);
        margin-top: 100px;
      }

      .header-content {
        padding: 0 20px;
      }

      .card {
        padding: 20px;
      }

      .avatar {
        width: 56px;
        height: 56px;
        font-size: 22px;
      }

      .profile {
        padding: 16px;
      }
    }
    /* === FIX header mobil: compact, aliniere corecta === */
header .header-content{
  align-items: center;
}

/* stil dedicat doar pentru butoanele din header (nu afecteaza restul paginii) */
header .btn{
  padding: 10px 18px;
  border-radius: 12px;
  font-size: 14px;
  box-shadow: 0 6px 18px rgba(0,229,255,.25);
  white-space: nowrap;
}

/* container auth (nume + logout) compact si pe un singur rand */
#authBox{
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;       /* impinge la dreapta */
  flex-wrap: nowrap;
}
#authBox .muted{
  font-size: 14px;
  color: var(--accent);
  line-height: 1;
}

/* buton logout mai discret in header */
#authBox #btnLogout{
  padding: 10px 14px !important;
  font-size: 14px !important;
  border-width: 1px;
  background: rgba(0,229,255,0.12);
  color: var(--neon-blue);
  border-color: rgba(0,229,255,0.35);
  box-shadow: none;
}

/* ===== Mobile ===== */
@media (max-width: 768px){
  header{ padding: 12px 0; }

  .header-content{
    max-width: 1100px;
    padding: 0 16px;
    gap: 12px;
  }

  /* micsoram butonul "Inapoi la Companii" doar in header */
  header .btn{
    padding: 8px 12px;
    font-size: 13px;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,229,255,.18);
  }

  /* layout pe un singur rand: buton stanga, auth dreapta */
  .header-content{
    display: grid;
    grid-template-columns: auto 1fr;
  }

  /* auth la dreapta, fara rupere pe doua randuri */
  #authBox{
    justify-self: end;
    gap: 8px;
  }
  #authBox .muted{
    font-size: 13px;
  }
  #authBox #btnLogout{
    padding: 8px 10px !important;
    font-size: 13px !important;
  }

  /* prevenim suprapuneri daca numele e foarte lung */
  #authBox .muted{
    max-width: 46vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
}
/* === Compact user card + avatar (OP si Replies) === */

/* Desktop: micsoram coloana stanga si spatiile */
@media (min-width: 769px){
  .post{
    grid-template-columns: 160px 1fr; /* era 200px */
    gap: 18px;                        /* era 28px */
  }
}

/* Card profil mai compact */
.post .profile{
  padding: 14px;          /* era 20px */
  gap: 8px;               /* era 12px */
  border-radius: 14px;    /* era 16px */
}

/* Avatar mai mic + glow redus */
.post .profile .avatar{
  width: 56px;            /* era 72px */
  height: 56px;           /* era 72px */
  font-size: 22px;        /* era 28px */
  box-shadow: 0 0 18px rgba(0,229,255,0.35); /* glow mai discret */
}

/* Tipografii mai compacte in card */
.post .profile a{
  font-size: 14px;        /* link nume */
}
.post .profile .muted{
  font-size: 12px;        /* timestamp */
  line-height: 1.2;
}

/* Mobile: si mai compact + layout pe un singur rand in profil */
@media (max-width: 768px){
  .post{
    gap: 14px;
  }
  .post .profile{
    padding: 12px;
    gap: 10px;
    flex-direction: row;      /* avatar stanga, text dreapta */
    align-items: center;
    text-align: left;
  }
  .post .profile .avatar{
    width: 44px;
    height: 44px;
    font-size: 18px;
    box-shadow: 0 0 12px rgba(0,229,255,0.3);
  }
  .post .profile a{
    font-size: 13px;
    max-width: 56vw;          /* evita ruperea pe mai multe randuri */
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .post .profile .muted{
    font-size: 12px;
  }
}
.custom-cursor { display: none !important; }
body { cursor: auto !important; }
  </style>
</head>
<body>
  <!-- Background Effects -->
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>
  <div class="gradient-orb orb-3"></div>
  <div class="scan-lines"></div>
  <div id="tech-grid"></div>
  <canvas id="scene-canvas"></canvas>
  <div id="cursor" class="custom-cursor"></div>

  <!-- Header -->
  <header>
    <div class="header-content">
      <a href="companii.html" class="btn">← Înapoi la Companii</a>
      <div id="authBox"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <div class="topic-head">
      <h1 id="topicTitle" class="topic-title">Se încarcă...</h1>
      <div id="topicMeta" class="topic-meta"></div>
    </div>

    <!-- Original Post -->
    <article id="opBox" class="post card"></article>

    <!-- Replies -->
    <section id="repliesBox" style="margin-top: 32px;">
      <h3 style="font-family: 'Orbitron', sans-serif; color: var(--neon-purple); margin-bottom: 20px; font-size: 22px;">Răspunsuri</h3>
      <div id="repliesList"></div>
    </section>

    <!-- Composer -->
    <section id="composer" class="composer card">
      <h3>Scrie un răspuns</h3>
      <form id="replyForm">
        <label for="replyText">Mesaj</label>
        <textarea id="replyText" name="content" required placeholder="Ideea / soluția ta..."></textarea>
        <div class="row">
          <button class="btn" type="submit">💬 Reply</button>
        </div>
        <div id="replyState" class="muted" style="margin-top: 12px; font-size: 14px;"></div>
      </form>
    </section>
  </main>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, initializeFirestore, doc, getDoc, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyDg_P0xmt22HyVNQbFQqH9ASP68sJ0b2j8",
      authDomain: "mtechdigital-2449f.firebaseapp.com",
      projectId: "mtechdigital-2449f",
      storageBucket: "mtechdigital-2449f.firebasestorage.app"
    });

    const auth = getAuth(app);
    const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true, useFetchStreams: true });

    // Helpers
    const $ = sel => document.querySelector(sel);
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    const rel = (ts) => {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return 'Acum';
      if (diff < 3600) return `Acum ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `Acum ${Math.floor(diff / 3600)} ore`;
      return `Acum ${Math.floor(diff / 86400)} zile`;
    };

    const devUrl = (uid) => `dev.html?uid=${encodeURIComponent(uid || '')}`;
    let __ME = null;

    // Auth UI
    const authBox = $('#authBox');
    function renderAuth(user) {
      __ME = user || null;
      if (!user) {
        authBox.innerHTML = `<button class="btn" id="btnLogin">🔐 Login</button>`;
        $('#btnLogin')?.addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
      } else {
        authBox.innerHTML = `<span class="muted">${esc(user.displayName || user.email || 'User')}</span> <button class="btn" id="btnLogout" style="margin-left: 12px;">Logout</button>`;
        $('#btnLogout')?.addEventListener('click', () => signOut(auth));
      }
    }

    onAuthStateChanged(auth, renderAuth);

    // Read topic
    const params = new URLSearchParams(location.search);
    const topicId = params.get('id');

    if (topicId) {
      try {
        await updateDoc(doc(db, 'topics', topicId), { views: increment(1) });
      } catch (e) {
        console.warn('views++ failed', e?.message || e);
      }
    }

    const topicTitle = $('#topicTitle');
    const topicMeta = $('#topicMeta');
    const opBox = $('#opBox');
    const repliesList = $('#repliesList');
    const replyForm = $('#replyForm');
    const replyState = $('#replyState');

    if (!topicId) {
      topicTitle.textContent = 'Subiect inexistent';
    } else {
      // Live topic
      const tRef = doc(db, 'topics', topicId);
      onSnapshot(tRef, (snap) => {
        if (!snap.exists()) {
          topicTitle.textContent = 'Subiect șters sau inexistent';
          return;
        }
        const t = snap.data();
        topicTitle.textContent = t.title || '(fără titlu)';
        topicMeta.innerHTML = `
          <span>Autor: ${t.authorName || 'Anonim'}</span>
          <span>${rel(t.createdAt)}</span>
          <span>${Number(t.repliesCount || 0)} răspunsuri</span>
          <span>${Number(t.views || 0)} vizualizări</span>
        `;
      });

      // Posts
      const postsQ = query(collection(db, 'topics', topicId, 'posts'), orderBy('createdAt', 'asc'));
      onSnapshot(postsQ, (snap) => {
        const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const op = all[0];
        const replies = all.slice(1);

        // OP
        if (op) {
          const amAutorOP = __ME && (__ME.uid === op.authorId);
          opBox.innerHTML = `
            <div class="profile">
              <a href="${devUrl(op.authorId)}" class="avatar" title="Vezi profilul">${esc((op.authorName || '?').charAt(0).toUpperCase())}</a>
              <a href="${devUrl(op.authorId)}">${esc(op.authorName || 'User')}</a>
              <div class="muted" style="font-size: 13px;">${rel(op.createdAt)}${op.updatedAt ? ` • editat ${rel(op.updatedAt)}` : ''}</div>
            </div>
            <div>
              <div class="post-content" id="opContent">${esc(op.content || '')}</div>
              ${amAutorOP ? `
                <div class="row">
                  <button class="btn" data-action="edit-op" data-postid="${op.id}" style="background: rgba(0,229,255,0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue);">Editează</button>
                </div>
                <div id="opEditBox" class="hidden"></div>
              ` : ''}
            </div>
          `;
        } else {
          opBox.innerHTML = `<div class="muted">Fără conținut inițial.</div>`;
        }

        // Replies
        const meId = __ME?.uid || null;
        repliesList.innerHTML = replies.map(r => {
          const amAutor = meId && (meId === r.authorId);
          return `
            <article class="post card reply" data-postid="${r.id}">
              <div class="profile">
                <a class="avatar" href="${devUrl(r.authorId)}" title="Vezi profilul">${esc((r.authorName || '?').charAt(0).toUpperCase())}</a>
                <a href="${devUrl(r.authorId)}">${esc(r.authorName || 'User')}</a>
                <div class="muted" style="font-size: 13px;">${rel(r.createdAt)}${r.updatedAt ? ` • editat ${rel(r.updatedAt)}` : ''}</div>
              </div>
              <div>
                <div class="head">
                  <div class="meta">Reply • ${rel(r.createdAt)}</div>
                  ${amAutor ? `<button class="btn" data-action="edit-reply" data-postid="${r.id}" style="background: rgba(0,229,255,0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 8px 16px; font-size: 13px;">Editează</button>` : ''}
                </div>
                <div class="post-content" id="content-${r.id}">${esc(r.content || '')}</div>
                ${amAutor ? `<div id="editBox-${r.id}" class="hidden"></div>` : ''}
              </div>
            </article>
          `;
        }).join('');
      });
    }

    // Submit reply
    replyForm?.addEventListener('submit', async (e) => {
      e.preventDefault();
      replyState.textContent = '';
      const u = auth.currentUser;
      if (!u) { replyState.textContent = 'Autentifică-te mai întâi.'; return; }
      if (!topicId) { replyState.textContent = 'Topic inexistent.'; return; }

      const fd = new FormData(replyForm);
      const content = String(fd.get('content') || '').trim();
      if (!content) { replyState.textContent = 'Scrie un mesaj.'; return; }

      try {
        const uDoc = await getDoc(doc(db, 'users', u.uid));
        const authorName = uDoc.exists() ? (uDoc.data().displayName || u.displayName || u.email) : (u.displayName || u.email);
        
        await addDoc(collection(db, 'topics', topicId, 'posts'), {
          authorId: u.uid,
          authorName: authorName || 'User',
          authorPhoto: u.photoURL || null,
          content,
          createdAt: serverTimestamp(),
          parentId: null
        });

        try {
          await updateDoc(doc(db, 'topics', topicId), {
            repliesCount: increment(1),
            lastActivityAt: serverTimestamp()
          });
        } catch (e) {
          await addDoc(collection(db, 'topics', topicId, '_touch'), { t: serverTimestamp() });
        }

        replyForm.reset();
        replyState.textContent = '✅ Trimis.';
      } catch (err) {
        console.error(err);
        replyState.textContent = '❌ Eroare la trimitere.';
      }
    });
  </script>

  <!-- Three.js Particles & UI -->
  <script>
    const IS_MOBILE = window.innerWidth <= 768;
    const REDUCE_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (!REDUCE_MOTION) {
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 50;

      const renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('scene-canvas'),
        alpha: true,
        antialias: false
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const particleCount = IS_MOBILE ? 80 : 350;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const velocities = [];

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 120;
        positions[i3 + 1] = Math.random() * -80 - 20;
        positions[i3 + 2] = (Math.random() - 0.5) * 60;

        velocities.push({
          x: (Math.random() - 0.5) * 0.015,
          y: Math.random() * 0.05 + 0.03,
          z: (Math.random() - 0.5) * 0.015
        });

        const colorType = Math.random();
        if (colorType < 0.45) {
          colors[i3] = 0; colors[i3 + 1] = 0.9; colors[i3 + 2] = 1;
        } else if (colorType < 0.9) {
          colors[i3] = 0.72; colors[i3 + 1] = 0.36; colors[i3 + 2] = 1;
        } else {
          colors[i3] = 1; colors[i3 + 1] = 0; colors[i3 + 2] = 0.5;
        }
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.6,
        sizeAttenuation: true,
        vertexColors: true,
        transparent: true,
        opacity: 0.75,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const particles = new THREE.Points(geometry, material);
      scene.add(particles);

      function animate() {
        requestAnimationFrame(animate);
        const positions = particles.geometry.attributes.position.array;
        
        for (let i = 0; i < particleCount; i++) {
          const i3 = i * 3;
          positions[i3] += velocities[i].x;
          positions[i3 + 1] += velocities[i].y;
          positions[i3 + 2] += velocities[i].z;

          if (positions[i3 + 1] > 60) {
            positions[i3] = (Math.random() - 0.5) * 120;
            positions[i3 + 1] = -60;
            positions[i3 + 2] = (Math.random() - 0.5) * 60;
          }

          if (Math.abs(positions[i3]) > 60) positions[i3] *= -0.9;
          if (Math.abs(positions[i3 + 2]) > 30) positions[i3 + 2] *= -0.9;
        }

        particles.geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // Custom cursor
    if (!IS_MOBILE && !REDUCE_MOTION) {
      const cursor = document.getElementById('cursor');
      let mouseX = 0, mouseY = 0;
      let cursorX = 0, cursorY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      document.querySelectorAll('a, button, textarea, input').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });

      function updateCursor() {
        cursorX += (mouseX - cursorX) * 0.55;
        cursorY += (mouseY - cursorY) * 0.55;
        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';
        requestAnimationFrame(updateCursor);
      }
      updateCursor();
    }
  </script>
</body>
