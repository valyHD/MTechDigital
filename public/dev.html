<!doctype html>
<html lang="ro">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

    <title>Profil dezvoltator • MTECH DIGITAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap');

        :root {
            --neon: #00e5ff;
            --neon2: #b85cff;
            --text: #e5f6ff;
            --muted: #8b9cb8;
            --card: rgba(15, 22, 36, .6)
        }

        body {
            margin: 0;
            background: radial-gradient(ellipse at top, #0f1624, #0a0e1a);
            color: var(--text);
            font-family: Inter
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 229, 255, .12)
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: Orbitron;
            font-weight: 900
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--neon), var(--neon2));
            display: grid;
            place-items: center;
            color: #0a0e1a
        }

        .grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            margin-top: 20px
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, .2);
            border-radius: 16px;
            padding: 16px
        }

        h2 {
            font-family: Orbitron;
            font-size: 20px;
            margin: 0 0 12px;
            color: #9fe8ff
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, .3);
            object-fit: cover;
            background: #06101a
        }

        .chip {
            border: 1px solid rgba(0, 229, 255, .25);
            background: rgba(0, 229, 255, .08);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: #9fe8ff;
            margin-right: 6px
        }

        .stars {
            display: inline-flex;
            gap: 4px
        }

        .star {
            font-size: 20px;
            opacity: .6
        }

        .star.on {
            opacity: 1
        }

        .apps {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px
        }

        .app {
            border: 1px solid rgba(0, 229, 255, .2);
            border-radius: 12px;
            padding: 12px;
            background: rgba(0, 229, 255, .04)
        }

        .review {
            border-top: 1px solid rgba(0, 229, 255, .12);
            padding-top: 12px;
            margin-top: 12px
        }

        @media (max-width:900px) {
            .grid {
                grid-template-columns: 1fr
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(0, 229, 255, .35);
            background: rgba(0, 229, 255, .07);
            color: #a3cef1;
            cursor: pointer
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 229, 255, .25);
            background: rgba(0, 229, 255, .06);
            color: var(--text)
        }

        /* Stele cu jumătăți */
        .stars {
            display: inline-flex;
            gap: 4px;
        }

        .star {
            position: relative;
            font-size: 20px;
            line-height: 1;
            color: #a3cef1;
            opacity: .5
        }

        .star.full {
            color: #ffd166;
            opacity: 1
        }

        .star.half {
            color: #a3cef1;
            opacity: 1
        }

        .star.half .fill {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            overflow: hidden;
            color: #ffd166;
        }
        .custom-cursor { display: none !important; }
body { cursor: auto !important; }
    </style>
</head>

<body>
    <header class="wrap">
        <div class="brand">
            <div class="logo">M</div>
            <div>MTECH DIGITAL</div>
        </div>
        <nav>
            <a href="index.html" style="color:#9fe8ff;text-decoration:none">Acasă</a>
        </nav>
    </header>

    <main class="wrap">
        <div class="grid">
            <section class="card" id="devLeft">
                <img id="avatar" class="avatar" alt="avatar">
                <h2 id="name" style="margin-top:10px">—</h2>
                <div id="headline" class="muted"></div>
                <div style="margin-top:10px" id="skills"></div>
                <div style="margin-top:10px" id="links"></div>
                <div style="margin-top:10px">
                    <div class="stars" title="rating mediu">
                        <span id="avgStars"></span>
                    </div>
                    <div class="muted" id="avgMeta"></div>
                </div>
            </section>

            <section class="card">
                <h2>Despre</h2>
                <p id="bio" class="muted">—</p>

                <h2 style="margin-top:14px">Experiență</h2>
                <div id="exp"></div>

                <h2 style="margin-top:14px">Aplicații publicate</h2>
                <div id="apps" class="apps"></div>

                <h2 style="margin-top:14px">Recenzii</h2>
                <div id="reviews"></div>

                <div id="reviewBox" class="card" style="margin-top:10px">
                    <h3 style="margin-top:0">Lasă o recenzie</h3>
                    <div id="starsInput" class="stars" style="margin:6px 0"></div>
                    <textarea id="revText" rows="3" placeholder="Feedback despre colaborare..."></textarea>
                    <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
                        <button id="btnSend" class="btn">Trimite</button>
                        <span id="revState" class="muted"></span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
       import {
  getFirestore, doc, getDoc, onSnapshot,  // <— adaugat onSnapshot
  collection, query, where, orderBy, limit, getDocs,
  addDoc, serverTimestamp, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyDg_P0xmt22HyVNQbFQqH9ASP68sJ0b2j8",
            authDomain: "mtechdigital-2449f.firebaseapp.com",
            projectId: "mtechdigital-2449f"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);
let me = null; // <— lipsa asta genera ReferenceError

        const params = new URLSearchParams(location.search);
        const uid = params.get('uid');

        if (!uid) { document.body.innerHTML = '<div class="wrap"><p>UID lipsă.</p></div>'; throw new Error('missing uid'); }

        const el = id => document.getElementById(id);

        function renderAvgStarsPrecise(avg) {
            // full = partea întreagă; half = dacă fracția e între 0.25 și 0.75
            const fullBase = Math.floor(avg);
            const frac = avg - fullBase;
            const addOne = (frac >= 0.75) ? 1 : 0;           // rotunjire vizuală aproape de următorul
            const half = (frac >= 0.25 && frac < 0.75) ? 1 : 0;

            const full = Math.min(5, fullBase + addOne);
            const halfUsed = (full < 5) ? half : 0;
            const empty = 5 - full - halfUsed;

            let html = '';
            for (let i = 0; i < full; i++) html += `<span class="star full">★</span>`;
            if (halfUsed) html += `<span class="star half"><span class="fill">★</span>☆</span>`;
            for (let i = 0; i < empty; i++) html += `<span class="star">☆</span>`;
            return html;
        }

        function updateAvgUI(avg, cnt) {
            document.getElementById('avgStars').innerHTML = renderAvgStarsPrecise(avg);
            document.getElementById('avgMeta').textContent = cnt
                ? `${avg.toFixed(1)} / 5 • ${cnt} recenzii`
                : 'Fără recenzii încă';
        }

        function renderChips(arr) { return (arr || []).map(x => `<span class="chip">${x}</span>`).join(''); }
        function esc(s) { return (s || '').replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m])); }
function photoUrlWithBust(p){
  const url = p.photoURL || p.photoUrl || p.avatarUrl || "";
  if (!url) return "";
  const v = (p.photoUpdatedAt?.seconds) || (p.updatedAt?.seconds) || Date.now();
  return url + (url.includes("?") ? `&v=${v}` : `?v=${v}`);
}


        let unsubProfile = null;
function listenProfile(){
  if (unsubProfile) { unsubProfile(); unsubProfile = null; }

  const ref = doc(db, 'users', uid);
  unsubProfile = onSnapshot(ref, (pSnap) => {
    if (!pSnap.exists()){
      el('name').textContent = 'Profil inexistent';
      el('avatar').src = 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect width=%22120%22 height=%22120%22 rx=%2216%22 fill=%22%2306111a%22/></svg>';
      return;
    }
    const p = pSnap.data();

    // NUME: acopera mai multe denumiri folosite posibil in app-ul tau
    const name =
      p.displayName || p.name || p.fullName || (p.profile && p.profile.name) || 'Dezvoltator';
    el('name').textContent = name;

    // POZA: cu cache-busting
const avat = photoUrlWithBust(p);
el('avatar').src = avat || 'data:image/svg+xml;utf8,<svg .../>';

    // restul campurilor
    el('headline').textContent = p.headline || '';
    el('bio').textContent = p.bio || '—';
    el('skills').innerHTML = renderChips(p.skills || []);

    const links = [
      p.github     ? `<a class="btn" target="_blank" href="${esc(p.github)}">GitHub</a>`       : '',
      p.portfolio  ? `<a class="btn" target="_blank" href="${esc(p.portfolio)}">Portofoliu</a>`: '',
      p.website    ? `<a class="btn" target="_blank" href="${esc(p.website)}">Website</a>`     : '',
      p.linkedin   ? `<a class="btn" target="_blank" href="${esc(p.linkedin)}">LinkedIn</a>`   : '',
      p.cvUrl      ? `<a class="btn" target="_blank" href="${esc(p.cvUrl)}">CV</a>`            : ''
    ].filter(Boolean).join(' ');
    el('links').innerHTML = links;

    const avg = Number(p.ratingAvg || 0);
    const cnt = Number(p.ratingCount || 0);
    updateAvgUI(avg, cnt);
    
    // experienta
    const expHost = el('exp');
    expHost.innerHTML = (p.experience || []).map(e => `
      <div class="review">
        <div><strong>${esc(e.role || '')}</strong> • ${esc(e.company || '')}</div>
        <div class="muted">${esc(e.period || '')}</div>
        <div>${esc(e.desc || '')}</div>
      </div>`).join('') || '<div class="muted">—</div>';
  }, (err) => {
    console.error('onSnapshot users/{uid} failed:', err);
  });
}
async function loadApps() {
  const host = el('apps');
  host.innerHTML = '<div class="muted">Se încarcă…</div>';
  try {
    const qRef = query(
      collection(db, 'apps'),
      where('ownerUid', '==', uid),
      where('status', '==', 'approved'),
      orderBy('createdAt', 'desc'),
      limit(6)
    );
    const snap = await getDocs(qRef);
    renderApps(snap.docs);
  } catch (e) {
    // fallback dacă lipsește indexul (failed-precondition)
    if (String(e?.code) === 'failed-precondition') {
      const qRef2 = query(
        collection(db, 'apps'),
        where('ownerUid', '==', uid),
        where('status', '==', 'approved')
      );
      const s2 = await getDocs(qRef2);
      const docs = s2.docs.sort(
        (a, b) => (b.data().createdAt?.toMillis?.() || 0) - (a.data().createdAt?.toMillis?.() || 0)
      ).slice(0, 6);
      renderApps(docs);
      console.warn('Index lipsă (ownerUid+status+createdAt). Am folosit fallback client-side.');
    } else {
      console.error(e);
      host.innerHTML = '<div class="muted">Nu s-au putut încărca aplicațiile.</div>';
    }
  }

  function renderApps(docs) {
    host.innerHTML = docs.length ? docs.map(d => {
      const a = d.data();
      return `<div class="app">
        <div style="font-weight:700">${esc(a.title || 'Aplicație Android')}</div>
        <div class="muted" style="font-size:13px">${esc(a.short || '')}</div>
        ${a.apkUrl ? `<div style="margin-top:6px"><a class="btn" href="${esc(a.apkUrl)}" target="_blank" rel="noopener">Descarcă</a></div>` : ''}
      </div>`;
    }).join('') : '<div class="muted">—</div>';
  }
}


        async function loadReviews() {
            const qRef = query(collection(db, 'users', uid, 'reviews'), orderBy('createdAt', 'desc'), limit(20));
            const snap = await getDocs(qRef);

            // lista
            document.getElementById('reviews').innerHTML = snap.empty ? '<div class="muted">Nu există recenzii.</div>' :
                snap.docs.map(d => {
                    const r = d.data();
                    const stars = Array.from({ length: 5 }, (_, i) => `<span class="star ${i < r.rating ? 'full' : ''}">★</span>`).join('');
                    return `<div class="review">
        <div class="stars">${stars}</div>
        <div>${esc(r.text || '')}</div>
        <div class="muted" style="font-size:12px">de la ${esc(r.authorName || r.authorUid || '—')}</div>
      </div>`;
                }).join('');

            // media + count (client-side)
            const ratings = snap.docs.map(d => Number(d.data().rating) || 0);
            const cnt = ratings.length;
            const avg = cnt ? (ratings.reduce((a, b) => a + b, 0) / cnt) : 0;
            updateAvgUI(avg, cnt);  // ← actualizează stânga sub avatar
        }


        // Review box: 5 stele clickabile
        let currentRating = 0;
        function renderStarsInput() {
            const host = document.getElementById('starsInput');
            host.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const b = document.createElement('button');
                b.type = 'button'; b.className = 'btn'; b.textContent = '★'; b.style.opacity = i <= currentRating ? '1' : '.5';
                b.onclick = () => { currentRating = i; renderStarsInput(); };
                host.appendChild(b);
            }
        }

        async function canReview(user) {
            if (!user || user.uid === uid) return { ok: false, why: 'Nu poți recenza propriul profil.' };
            // (opțional: verifică dacă există deja o recenzie de la acest autor)
            return { ok: true };
        }

        async function sendReview() {
            if (!me) return;
            if (!currentRating) { document.getElementById('revState').textContent = 'Alege un rating.'; return; }
            const text = document.getElementById('revText').value.trim();

            const reviewsCol = collection(db, 'users', uid, 'reviews');
            const btn = document.getElementById('btnSend');
            btn.disabled = true; document.getElementById('revState').textContent = 'Se trimite...';

            try {
                await addDoc(reviewsCol, {
                    rating: currentRating,
                    text,
                    authorUid: me.uid,
                    authorName: me.displayName || me.email || null,
                    createdAt: serverTimestamp()
                });

                // curăț UI + reîncarc lista și media calculată local
                document.getElementById('revText').value = '';
                currentRating = 0; renderStarsInput();
                document.getElementById('revState').textContent = '✅ Mulțumim!';

                await loadReviews(); // asta va recalcula media și va actualiza steluțele din stânga
            } catch (e) {
                console.error(e);
                document.getElementById('revState').textContent = 'Eroare la trimitere.';
            } finally {
                btn.disabled = false;
            }
        }


        document.getElementById('btnSend').onclick = sendReview;

        onAuthStateChanged(auth, async (user) => {
            me = user || null;
            renderStarsInput();
            const box = document.getElementById('reviewBox');
            const gate = await canReview(user);
            box.style.display = gate.ok ? 'block' : 'none';
            if (!gate.ok && user) { document.getElementById('revState').textContent = gate.why; }
        });

        // go
// go – rulează toate, dar nu bloca UI dacă una eșuează
listenProfile();
Promise.allSettled([loadApps(), loadReviews()]);

    </script>
</body>

</html>
